server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edu_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: eduManagementSecretKey2024VeryLongSecretKeyForJwtToken
  expiration: 86400000

logging:
  level:
    com.school: DEBUG
    org.hibernate.SQL: DEBUG